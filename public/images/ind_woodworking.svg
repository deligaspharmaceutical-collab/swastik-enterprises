<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="wood-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63" />
      <stop offset="100%" stop-color="#4E342E" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFCC80" />
      <stop offset="100%" stop-color="#FFAB91" />
    </linearGradient>
  </defs>
  
  <!-- Base background (soft gray/cream) -->
  <rect width="400" height="300" fill="#F7F9FA" />
  
  <!-- Abstract Design: Wooden planks overlapping -->
  <g transform="translate(40, 50)">
    <!-- Main Board -->
    <rect x="0" y="60" width="320" height="80" rx="6" fill="url(#wood-grad)" />
    <!-- Wood grain lines -->
    <path d="M 10,85 C 80,80 120,95 200,85 C 260,80 290,90 310,85" fill="none" stroke="#3E2723" stroke-width="2" opacity="0.3" />
    <path d="M 20,115 C 70,110 150,120 220,110 C 270,110 290,115 300,110" fill="none" stroke="#3E2723" stroke-width="2" opacity="0.3" />
    
    <!-- Joint/Glue squeeze out (showing bonding) -->
    <path d="M 0,60 L 320,60" fill="none" stroke="#FF5722" stroke-width="4" stroke-linecap="round" />
    
    <!-- Upper Board (Bonded) -->
    <rect x="40" y="10" width="240" height="50" rx="4" fill="#A1887F" />
    <path d="M 50,30 C 100,25 150,35 200,30 C 230,25 260,30 270,30" fill="none" stroke="#4E342E" stroke-width="1.5" opacity="0.25" />
    
    <!-- Ruler/Compass measuring lines (design look) -->
    <line x1="0" y1="160" x2="320" y2="160" stroke="#B0BEC5" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="160" y1="0" x2="160" y2="180" stroke="#B0BEC5" stroke-width="2" stroke-dasharray="4,4" />
    
    <!-- Pencil / Crafting tool (abstracted) -->
    <g transform="translate(230, 20) rotate(-35)">
      <path d="M 0,0 L 8,0 L 8,90 L 4,100 L 0,90 Z" fill="url(#accent-grad)" />
      <path d="M 0,90 L 8,90 L 4,100 Z" fill="#3E2723" />
      <rect x="0" y="0" width="8" height="15" fill="#E91E63" />
    </g>
  </g>
</svg>
