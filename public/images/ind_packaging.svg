<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0A96D" />
      <stop offset="100%" stop-color="#D291BC" />
    </linearGradient>
    <linearGradient id="box-side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD8D7A" />
      <stop offset="100%" stop-color="#8F5B4B" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#F4F6F8" />
  
  <g transform="translate(60, 40)">
    <!-- Back Box -->
    <g transform="translate(120, 20) scale(0.8)">
      <!-- Isometric Box -->
      <!-- Left Side -->
      <path d="M 0,60 L 0,160 L 80,200 L 80,100 Z" fill="#BCAAA4" />
      <!-- Right Side -->
      <path d="M 80,100 L 80,200 L 160,160 L 160,60 Z" fill="#8D6E63" />
      <!-- Top Side -->
      <path d="M 0,60 L 80,20 L 160,60 L 80,100 Z" fill="#D7CCC8" />
      <!-- Packaging Tape -->
      <path d="M 80,20 L 80,100" stroke="#FF5722" stroke-width="8" fill="none" opacity="0.8" />
    </g>

    <!-- Main Front Box -->
    <g transform="translate(10, 40)">
      <!-- Left Wall -->
      <path d="M 0,80 L 0,200 L 110,250 L 110,130 Z" fill="#CD8B62" />
      <!-- Right Wall -->
      <path d="M 110,130 L 110,250 L 220,200 L 220,80 Z" fill="#B07550" />
      <!-- Top Flaps (Open / Closed styled) -->
      <!-- Top Lid Left -->
      <path d="M 0,80 L 110,30 L 220,80 L 110,130 Z" fill="#E5AD84" />
      
      <!-- Strong Orange Adhesive Tape sealing the box -->
      <path d="M 110,30 L 110,130" stroke="#E64A19" stroke-width="12" fill="none" stroke-linecap="round" />
      <path d="M 110,130 L 110,200" stroke="#FF5722" stroke-width="12" fill="none" stroke-linecap="round" />
      
      <!-- Packaging Labels -->
      <rect x="25" y="120" width="30" height="40" rx="3" fill="#FFFFFF" opacity="0.9" transform="skewY(20)" />
      <line x1="30" y1="130" x2="50" y2="130" stroke="#795548" stroke-width="2" transform="skewY(20)" />
      <line x1="30" y1="140" x2="45" y2="140" stroke="#795548" stroke-width="2" transform="skewY(20)" />
      
      <!-- Fragile glass icon -->
      <path d="M 170,110 L 180,110 L 180,125 L 175,135 L 175,145 L 170,145 L 170,135 L 165,125 Z" fill="#5D4037" opacity="0.3" transform="skewY(-20)" />
    </g>
  </g>
</svg>
