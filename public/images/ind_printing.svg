<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="metal-roller" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CFD8DC" />
      <stop offset="30%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#90A4AE" />
      <stop offset="100%" stop-color="#37474F" />
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BCD4" /> <!-- Cyan -->
      <stop offset="33%" stop-color="#E91E63" /> <!-- Magenta -->
      <stop offset="66%" stop-color="#FFEB3B" /> <!-- Yellow -->
      <stop offset="100%" stop-color="#FF5722" /> <!-- Swastik Orange -->
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="#ECEFF1" />

  <g transform="translate(40, 30)">
    <!-- Back Roller -->
    <rect x="50" y="30" width="220" height="40" rx="20" fill="url(#metal-roller)" />
    
    <!-- Paper Sheet Flowing over rollers -->
    <path d="M 60,50 Q 160,120 160,200 L 260,200 Q 260,120 160,50 Z" fill="url(#rainbow)" opacity="0.85" />
    
    <!-- Front Roller (Primary) -->
    <g transform="translate(100, 120)">
      <!-- Outer Metal Cylinder -->
      <rect x="0" y="0" width="120" height="50" rx="25" fill="url(#metal-roller)" />
      <!-- Gear/Axis lines -->
      <circle cx="20" cy="25" r="15" fill="#37474F" />
      <circle cx="20" cy="25" r="6" fill="#B0BEC5" />
      <circle cx="100" cy="25" r="15" fill="#37474F" />
      <circle cx="100" cy="25" r="6" fill="#B0BEC5" />
    </g>

    <!-- Guide rollers -->
    <rect x="230" y="190" width="80" height="24" rx="12" fill="url(#metal-roller)" />
    
    <!-- Dots / Sparkles of high quality lamination/coating -->
    <circle cx="150" cy="90" r="4" fill="#FFFFFF" />
    <circle cx="190" cy="150" r="5" fill="#FFFFFF" />
    <circle cx="240" cy="110" r="3" fill="#FFFFFF" />
    
    <!-- Glossy reflection overlay -->
    <path d="M 160,50 Q 200,80 220,110" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
  </g>
</svg>
