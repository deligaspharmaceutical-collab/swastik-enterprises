<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="barrel-shading" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="25%" stop-color="#1A1A1A" />
      <stop offset="60%" stop-color="#4F4F4F" />
      <stop offset="85%" stop-color="#111111" />
      <stop offset="100%" stop-color="#222222" />
    </linearGradient>
  </defs>

  <rect width="300" height="300" rx="16" fill="url(#bg-grad)" />

  <!-- Shadow -->
  <ellipse cx="150" cy="245" rx="72" ry="12" fill="#E5E7EB" />

  <!-- Black Barrel -->
  <g transform="translate(70, 45)">
    <!-- Main Cylinder -->
    <path d="M 10,50 L 150,50 L 150,190 A 70,12 0 0,1 10,190 Z" fill="url(#barrel-shading)" />
    <!-- Lid / Top -->
    <ellipse cx="80" cy="50" rx="70" ry="12" fill="#1A1A1A" stroke="#4F4F4F" stroke-width="1.5" />
    <ellipse cx="80" cy="50" rx="62" ry="10" fill="#2E2E2E" />
    <circle cx="50" cy="50" r="6" fill="#4F4F4F" />

    <!-- Barrel Ridges -->
    <path d="M 9.5,95 A 70.5,10 0 0,0 150.5,95" fill="none" stroke="#222222" stroke-width="6" />
    <path d="M 9.5,95 A 70.5,10 0 0,0 150.5,95" fill="none" stroke="#555555" stroke-width="2" />
    
    <path d="M 9.5,145 A 70.5,10 0 0,0 150.5,145" fill="none" stroke="#222222" stroke-width="6" />
    <path d="M 9.5,145 A 70.5,10 0 0,0 150.5,145" fill="none" stroke="#555555" stroke-width="2" />

    <!-- Bottom line -->
    <path d="M 10,190 A 70,12 0 0,0 150,190" fill="none" stroke="#1A1A1A" stroke-width="2" />

    <!-- White Logo -->
    <g transform="translate(50, 102) scale(0.75)">
      <!-- Swastik Symbol -->
      <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
        <path d="M 40,10 L 40,25 A 3,3 0 0,1 37,28 L 20,28" />
        <path d="M 60,28 L 43,28 A 3,3 0 0,1 40,31 L 40,46" />
      </g>
      <text x="40" y="62" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">SWASTIK</text>
      <text x="40" y="72" font-family="'Outfit', sans-serif" font-weight="500" font-size="7" fill="#CCCCCC" text-anchor="middle">COATINGS</text>
    </g>
  </g>
</svg>
