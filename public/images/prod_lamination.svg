<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="can-shading" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#ECEFF1" />
      <stop offset="100%" stop-color="#CFD8DC" />
    </linearGradient>
    <linearGradient id="orange-label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5722" />
      <stop offset="100%" stop-color="#E64A19" />
    </linearGradient>
  </defs>

  <rect width="300" height="300" rx="16" fill="url(#bg-grad)" />

  <!-- Shadow -->
  <ellipse cx="150" cy="245" rx="70" ry="12" fill="#E5E7EB" />

  <!-- Jerrycan -->
  <g transform="translate(85, 45)">
    <!-- Container Body -->
    <rect x="15" y="55" width="100" height="150" rx="14" ry="14" fill="url(#can-shading)" />
    <!-- Cap (Orange/Red) -->
    <rect x="35" y="40" width="26" height="16" rx="2" fill="#D84315" />
    <ellipse cx="48" cy="40" rx="13" ry="3" fill="#FF5722" />
    <!-- Handle -->
    <path d="M 75,55 L 75,38 A 8,8 0 0,0 67,30 L 48,30" fill="none" stroke="#ECEFF1" stroke-width="10" stroke-linecap="round" />

    <!-- Label -->
    <rect x="25" y="90" width="80" height="85" rx="6" fill="url(#orange-label)" />
    
    <!-- Logo inside Label -->
    <g transform="translate(35, 95) scale(0.65)">
      <!-- Swastik Symbol -->
      <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
        <path d="M 40,10 L 40,25 A 3,3 0 0,1 37,28 L 20,28" />
        <path d="M 60,28 L 43,28 A 3,3 0 0,1 40,31 L 40,46" />
      </g>
      <text x="40" y="65" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">SWASTIK</text>
      <text x="40" y="75" font-family="'Outfit', sans-serif" font-weight="500" font-size="7" fill="#FFE0B2" text-anchor="middle">LAMINATION</text>
    </g>
  </g>
</svg>
