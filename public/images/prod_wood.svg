<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="bucket-shading" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7043" />
      <stop offset="100%" stop-color="#F4511E" />
    </linearGradient>
  </defs>

  <rect width="300" height="300" rx="16" fill="url(#bg-grad)" />
  
  <!-- Shadow -->
  <ellipse cx="150" cy="245" rx="75" ry="12" fill="#E5E7EB" />

  <!-- Bucket Container -->
  <g transform="translate(60, 40)">
    <!-- Main Body -->
    <path d="M 30,60 L 150,60 L 135,190 A 45,10 0 0,1 45,190 Z" fill="url(#bucket-shading)" />
    
    <!-- Lid -->
    <ellipse cx="90" cy="60" rx="63" ry="11" fill="#E64A19" />
    <ellipse cx="90" cy="57" rx="65" ry="9" fill="#FF5722" />
    <ellipse cx="90" cy="54" rx="65" ry="7" fill="#FF7043" />
    
    <!-- Metal handle wire -->
    <path d="M 26,75 A 72,72 0 0,1 154,75" fill="none" stroke="#9CA3AF" stroke-width="2" />
    <circle cx="25" cy="75" r="4" fill="#9CA3AF" />
    <circle cx="155" cy="75" r="4" fill="#9CA3AF" />

    <!-- Label -->
    <path d="M 32,95 L 148,95 L 142,160 L 38,160 Z" fill="url(#orange-grad)" />
    
    <!-- Text / Logo Details inside Label -->
    <g transform="translate(65, 102) scale(0.6)">
      <!-- Swastik Symbol -->
      <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
        <path d="M 40,10 L 40,25 A 3,3 0 0,1 37,28 L 20,28" />
        <path d="M 60,28 L 43,28 A 3,3 0 0,1 40,31 L 40,46" />
      </g>
      <text x="40" y="65" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">SWASTIK</text>
      <text x="40" y="75" font-family="'Outfit', sans-serif" font-weight="500" font-size="7" fill="#FFE0B2" text-anchor="middle">WOOD ADHESIVES</text>
    </g>
  </g>
</svg>
